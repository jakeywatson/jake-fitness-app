name: Firebase Crawl Only

on:
  workflow_dispatch:

jobs:
  firebase-test:
    name: Firebase Test Lab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest APK artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-apk.yml
          name: zero-to-fit-debug
          path: ./apk

      - name: Find APK
        id: find-apk
        run: echo "apk=$(find ./apk -name '*.apk' | head -1)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Ensure test account exists with full data
        run: |
          ANON="${{ secrets.SUPABASE_ANON_KEY }}"
          BASE="https://wkgqvekoinagrswusjhq.supabase.co"

          # Create account (ignore error if exists)
          curl -s -X POST "$BASE/auth/v1/signup" \
            -H "apikey: $ANON" -H "Content-Type: application/json" \
            -d '{"email":"robot@zeroto.fit","password":"RobotTest2026!"}' > /dev/null || true

          # Sign in
          TOKEN=$(curl -s -X POST "$BASE/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d '{"email":"robot@zeroto.fit","password":"RobotTest2026!"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token']+'|'+d['user']['id'])")
          ACCESS=$(echo $TOKEN | cut -d'|' -f1)
          USER_ID=$(echo $TOKEN | cut -d'|' -f2)
          echo "Signed in as robot@zeroto.fit ($USER_ID)"

          # Upsert full state: premium, weight history, onboarding complete
          DATA='{"weights":[{"date":"2026-03-01","lbs":258},{"date":"2026-03-15","lbs":255},{"date":"2026-04-01","lbs":252},{"date":"2026-04-15","lbs":249},{"date":"2026-04-21","lbs":246}],"goalLbs":196,"heightCm":188,"ageYears":32,"trainingDays":3,"onboardingComplete":true,"feedOptIn":false,"testIsPremium":true,"aiPlan":null,"calorieBurns":[]}'
          curl -s -X POST "$BASE/rest/v1/fitness_data" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ACCESS" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\":\"$USER_ID\",\"data\":$DATA,\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            && echo "Test data upserted (premium=true, 5 weight entries)" || echo "Upsert failed (non-fatal)"

      - name: Run Firebase Test Lab (Robo crawl)
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ${{ steps.find-apk.outputs.apk }} \
            --device model=Pixel2.arm,version=28,locale=en,orientation=portrait \
            --device model=MediumPhone.arm,version=28,locale=en,orientation=portrait \
            --timeout 5m \
            --robo-directives \
              "ignore:google-btn=,text:email-input=robot@zeroto.fit,text:password-input=RobotTest2026!" \
            --results-bucket gs://jake-fitness-test-results \
            --results-dir "run_$(date +%Y%m%d_%H%M%S)" \
            2>&1 | tee firebase_output.txt
        continue-on-error: true

      - name: Parse and display results
        run: |
          echo "=== Firebase Test Lab Results ==="
          cat firebase_output.txt || true
          if grep -q "Passed" firebase_output.txt 2>/dev/null; then
            echo "✅ ROBO TEST PASSED"
          elif grep -q "Failed\|FAILED" firebase_output.txt 2>/dev/null; then
            echo "❌ ROBO TEST FAILED"
          fi

      - name: Download test results
        if: always()
        run: |
          mkdir -p test-results
          RESULTS=$(grep -o 'gs://[^ ]*' firebase_output.txt 2>/dev/null | head -1 || echo "")
          if [ -n "$RESULTS" ]; then
            gsutil -m cp -r "$RESULTS" ./test-results/ 2>/dev/null || true
          fi

      - name: Upload Firebase results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14
