name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Prebuild Android
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK (faster, no signing needed)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jake-fitness-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
