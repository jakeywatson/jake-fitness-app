name: Build, Test & Verify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ─── Stage 1: Jest unit tests (fast, ~15s) ───────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run tests
        run: npm test -- --watchAll=false --forceExit --ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  # ─── Stage 2: Build APK ──────────────────────────────────────────────────
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    outputs:
      apk-path: ${{ steps.find-apk.outputs.apk-path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Expo prebuild
        run: CI=1 npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk-path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh $APK

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jake-fitness-debug
          path: ${{ steps.find-apk.outputs.apk-path }}
          retention-days: 30

  # ─── Stage 3: Firebase Test Lab ──────────────────────────────────────────
  firebase-test:
    name: Firebase Test Lab
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: jake-fitness-debug
          path: ./apk

      - name: Find downloaded APK
        id: find-apk
        run: |
          APK=$(find ./apk -name "*.apk" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable testing.googleapis.com --quiet || true
          gcloud services enable toolresults.googleapis.com --quiet || true

      - name: Run Firebase Test Lab (robo crawl)
        id: firebase-test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ${{ steps.find-apk.outputs.apk }} \
            --device model=Pixel3,version=30,locale=en,orientation=portrait \
            --timeout 3m \
            --robo-directives "text:placeholder_stone=17,text:placeholder_lbs=8" \
            --results-bucket gs://jake-fitness-test-results \
            --results-dir "run_$(date +%Y%m%d_%H%M%S)" \
            --format json \
            2>&1 | tee firebase_output.txt
          
          # Check if passed
          if grep -q '"outcome": "success"' firebase_output.txt; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Download test results (screenshots + video)
        if: always()
        run: |
          mkdir -p test-results
          # Extract results bucket path from output
          RESULTS_PATH=$(grep -o 'gs://[^ ]*' firebase_output.txt | head -1 || echo "")
          if [ -n "$RESULTS_PATH" ]; then
            gsutil -m cp -r "$RESULTS_PATH" ./test-results/ 2>/dev/null || true
          fi

      - name: Upload Firebase results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: test-results/
          retention-days: 14

      - name: Report result
        run: |
          if [ "${{ steps.firebase-test.outputs.result }}" = "passed" ]; then
            echo "✅ Firebase Test Lab passed — app runs correctly on Pixel 3 (Android 11)"
          else
            echo "⚠️  Firebase Test Lab result — check artifacts for screenshots/video"
            # Don't fail the build — test lab gives us info, APK is still downloadable
          fi
