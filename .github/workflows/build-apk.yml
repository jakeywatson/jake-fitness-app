name: Build, Test & Verify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ─── Stage 1: Jest unit tests ─────────────────────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run tests
        run: npm test -- --watchAll=false --forceExit --ci

  # ─── Stage 2: Build APK ───────────────────────────────────────────────────
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    outputs:
      apk-path: ${{ steps.find-apk.outputs.apk-path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Inject credentials into config
        run: |
          sed -i "s|REPLACE_WITH_STRAVA_CLIENT_ID|${{ secrets.STRAVA_CLIENT_ID }}|g" src/constants/config.js || true
          sed -i "s|REPLACE_WITH_STRAVA_CLIENT_SECRET|${{ secrets.STRAVA_CLIENT_SECRET }}|g" src/constants/config.js || true

      - name: Expo prebuild
        run: CI=1 npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk-path=$APK" >> $GITHUB_OUTPUT
          ls -lh $APK

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zero-to-fit-debug
          path: ${{ steps.find-apk.outputs.apk-path }}
          retention-days: 30

  # ─── Stage 3: Firebase Test Lab ───────────────────────────────────────────
  firebase-test:
    name: Firebase Test Lab
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: zero-to-fit-debug
          path: ./apk

      - name: Find APK
        id: find-apk
        run: echo "apk=$(find ./apk -name '*.apk' | head -1)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: List available devices
        run: gcloud firebase test android models list 2>&1 | grep -E "VIRTUAL|Pixel|nexus" | head -20 || true

      - name: Ensure test account exists with full data
        run: |
          ANON="${{ secrets.SUPABASE_ANON_KEY }}"
          BASE="https://wkgqvekoinagrswusjhq.supabase.co"
          curl -s -X POST "$BASE/auth/v1/signup" \
            -H "apikey: $ANON" -H "Content-Type: application/json" \
            -d '{"email":"robot@zeroto.fit","password":"RobotTest2026!"}' > /dev/null || true
          TOKEN=$(curl -s -X POST "$BASE/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d '{"email":"robot@zeroto.fit","password":"RobotTest2026!"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token']+'|'+d['user']['id'])")
          ACCESS=$(echo $TOKEN | cut -d'|' -f1)
          USER_ID=$(echo $TOKEN | cut -d'|' -f2)
          DATA='{"weights":[{"date":"2026-03-01","lbs":258},{"date":"2026-03-15","lbs":255},{"date":"2026-04-01","lbs":252},{"date":"2026-04-15","lbs":249},{"date":"2026-04-21","lbs":246}],"goalLbs":196,"heightCm":188,"ageYears":32,"trainingDays":3,"onboardingComplete":true,"feedOptIn":false,"testIsPremium":true,"aiPlan":null,"calorieBurns":[]}'
          curl -s -X POST "$BASE/rest/v1/fitness_data" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ACCESS" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\":\"$USER_ID\",\"data\":$DATA,\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            && echo "Test data upserted" || echo "Upsert failed (non-fatal)"

      - name: Run Firebase Test Lab (Robo crawl)
        run: |
          gcloud firebase test android run \
            --type robo \
            --app ${{ steps.find-apk.outputs.apk }} \
            --device model=Pixel2.arm,version=28,locale=en,orientation=portrait \
            --device model=MediumPhone.arm,version=28,locale=en,orientation=portrait \
            --timeout 5m \
            --robo-directives \
              "ignore:google-btn=,text:email-input=robot@zeroto.fit,text:password-input=RobotTest2026!" \
            --results-bucket gs://jake-fitness-test-results \
            --results-dir "run_$(date +%Y%m%d_%H%M%S)" \
            2>&1 | tee firebase_output.txt
        continue-on-error: true

      - name: Parse and display results
        run: |
          echo "=== Firebase Test Lab Results ==="
          cat firebase_output.txt || true
          echo ""
          if grep -q "Passed" firebase_output.txt 2>/dev/null; then
            echo "✅ ROBO TEST PASSED"
          elif grep -q "Failed\|FAILED" firebase_output.txt 2>/dev/null; then
            echo "❌ ROBO TEST FAILED — check Firebase console"
          elif grep -q "Skipped\|Incompatible" firebase_output.txt 2>/dev/null; then
            echo "⚠️  DEVICE INCOMPATIBLE — check device config"
          else
            echo "ℹ️  Test completed — check Firebase console for full results"
          fi

      - name: Download test results
        if: always()
        run: |
          mkdir -p test-results
          RESULTS=$(grep -o 'gs://[^ ]*' firebase_output.txt 2>/dev/null | head -1 || echo "")
          if [ -n "$RESULTS" ]; then
            gsutil -m cp -r "$RESULTS" ./test-results/ 2>/dev/null || true
            echo "Results downloaded from: $RESULTS"
          fi

      - name: Upload Firebase results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14
